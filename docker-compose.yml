services:
  php:
    build:
      args:
        HOST_USER_ID: "${HOST_USER_ID:-1000}"
        HOST_GROUP_ID: "${HOST_GROUP_ID:-1000}"
      context: docker
      dockerfile: php/Dockerfile
    user: "${HOST_USER_ID:-1000}:${HOST_GROUP_ID:-1000}"
    volumes:
      - ./app:/var/www
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./app:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin/phpmyadmin:latest
    depends_on:
      - mysql
    env_file:
      - docker/env/phpmyadmin.env
    ports:
      - "8080:80"
    networks:
      - app-network

  composer:
    container_name: composer
    build:
      args:
        HOST_USER_ID: "${HOST_USER_ID:-1000}"
        HOST_GROUP_ID: "${HOST_GROUP_ID:-1000}"
      context: docker
      dockerfile: composer/Dockerfile
    user: "${HOST_USER_ID:-1000}:${HOST_GROUP_ID:-1000}"
    volumes:
      - ./app:/var/www
    profiles: [ "tools" ]

networks:
  app-network:

volumes:
  mysql-data: